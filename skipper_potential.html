<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Skipper CCD Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; color: #333; max-width: 900px; margin: 4rem auto; padding: 0 1rem; }
        .dashboard { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .state-display { font-size: 24px; font-weight: bold; font-family: monospace; color: #2c3e50; }
        .adc-badge { font-size: 14px; font-weight: bold; padding: 6px 12px; border-radius: 4px; transition: all 0.2s; }
        .adc-active { background-color: #2ecc71; color: white; box-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
        .adc-inactive { background-color: #e0e0e0; color: #7f8c8d; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .ctrl-btn { padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; background: #f0f7ff; color: #0056b3; border: 2px solid #0056b3; border-radius: 6px; transition: background 0.2s; }
        .ctrl-btn:hover { background: #e0f0ff; }
        .ctrl-btn:disabled { border-color: #ccc; color: #ccc; background: #f9f9f9; cursor: not-allowed; }
        .grid-line { stroke: #e0e0e0; stroke-width: 1; stroke-dasharray: 4; }
        .axis-text { font-size: 12px; fill: #666; }
        .gate-label { font-size: 16px; font-weight: bold; text-anchor: middle; }
        .potential-line { fill: none; stroke: #2c3e50; stroke-width: 5; stroke-linejoin: round; }
        .charge { fill: #e74c3c; opacity: 0.9; }
        .status-text { text-align: center; color: #666; font-style: italic; margin-bottom: 10px; }
        .mr-indicator { font-size: 14px; font-weight: bold; fill: #e67e22; opacity: 0; transition: opacity 0.2s; }
    </style>
</head>
<body>

    <h2>Core Output Stage Sequence</h2>
    <p>This diagram parses the live <code>sequencer_simple_qis.xml</code> and <code>voltage_skp_lta_v2.sh</code> files. It maps the physical charge channel and visualizes the electrical MR reset.</p>

    <div class="dashboard" id="viz-container">
        <div class="header-panel">
            <div class="state-display" id="state-name">Loading Live Data...</div>
            <div class="adc-badge adc-inactive" id="adc-badge">ADC Inactive</div>
        </div>
        <div class="status-text" id="status-msg">Fetching files from repository</div>
        
        <div id="viz"></div>
        
        <div class="controls">
            <button class="ctrl-btn" id="prev-btn" onclick="step(-1)" disabled>◀ Previous</button>
            <button class="ctrl-btn" id="next-btn" onclick="step(1)" disabled>Next ▶</button>
        </div>
    </div>

    <script>
        let parsedSequence = [];
        let currentState = 0;

        const margin = {top: 50, right: 30, bottom: 40, left: 60};
        const width = 800 - margin.left - margin.right;
        const height = 450 - margin.top - margin.bottom;
        const gates = ['SW', 'OG', 'Sense Node', 'DG', 'Drain'];
        const sectionWidth = width / gates.length;
        const yScale = d3.scaleLinear().domain([8, -26]).range([0, height]);

        const svg = d3.select("#viz").append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const yTicks = d3.range(8, -27, -4);
        svg.selectAll(".grid-line").data(yTicks).enter().append("line").attr("class", "grid-line").attr("x1", 0).attr("x2", width).attr("y1", d => yScale(d)).attr("y2", d => yScale(d));
        svg.selectAll(".axis-text").data(yTicks).enter().append("text").attr("class", "axis-text").attr("x", -10).attr("y", d => yScale(d) + 4).attr("text-anchor", "end").text(d => `${d}V`);
        svg.selectAll(".gate-label").data(gates).enter().append("text").attr("class", "gate-label").attr("x", (d, i) => (i * sectionWidth) + (sectionWidth / 2)).attr("y", -15).text(d => d);

        const path = svg.append("path").attr("class", "potential-line");
        const chargePacket = svg.append("g").attr("class", "charge-group").style("opacity", 0);
        [[ -8,0], [8,0], [0,-8], [-5,8], [5,8], [0,0]].forEach(pos => {
            chargePacket.append("circle").attr("r", 4).attr("cx", pos[0]).attr("cy", pos[1]).attr("class", "charge");
        });

        // Electrical Reset Indicator
        const mrIndicator = svg.append("text").attr("class", "mr-indicator").attr("x", sectionWidth * 2.5).attr("y", -35).attr("text-anchor", "middle").text("⚡ MR Clamped to Vref");

        async function loadAndParse() {
            try {
                const bashResponse = await fetch('voltage_skp_lta_v2.sh');
                const xmlResponse = await fetch('sequencer_simple_qis.xml');
                
                if (!bashResponse.ok || !xmlResponse.ok) throw new Error("Could not locate config files.");
                
                const bashText = await bashResponse.text();
                const xmlText = await xmlResponse.text();
                const safeXmlText = `<root>${xmlText}</root>`;

                const v = {};
                const regex1 = /([a-z0-9_]+)=([-0-9.]+)/gi;
                const regex2 = /set\s+([a-z0-9_]+)\s+([-0-9.]+)/gi;
                let match;
                while ((match = regex1.exec(bashText)) !== null) { v[match[1]] = parseFloat(match[2]); }
                while ((match = regex2.exec(bashText)) !== null) { v[match[1]] = parseFloat(match[2]); }

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(safeXmlText, "text/xml");
                if (xmlDoc.querySelector("parsererror")) throw new Error("XML formatting error.");
                
                const stateDict = {};
                Array.from(xmlDoc.querySelectorAll("variables state")).forEach(el => {
                    stateDict[el.getAttribute("name")] = el.getAttribute("val");
                });

                const steps = Array.from(xmlDoc.querySelectorAll("recipe[name='skipper'] step"));
                
                parsedSequence = steps.map(step => {
                    const id = step.getAttribute("state");
                    const valStr = stateDict[id] || "";
                    
                    const isHD1 = valStr.includes("HD1");
                    const isHD2 = valStr.includes("HD2");
                    let adcTxt = "ADC Inactive";
                    let adcActive = false;
                    if (isHD1) { adcTxt = "HD1 (Pedestal) Active"; adcActive = true; }
                    if (isHD2) { adcTxt = "HD2 (Signal) Active"; adcActive = true; }

                    // Physical Channel Map
                    // Channel under SN is offset slightly deeper than Vref due to depletion
                    const snChannel = (v.vr || -7) - 1.5; 
                    
                    return {
                        id: id,
                        timer: step.getAttribute("delay"),
                        sw: valStr.includes("SWA") ? v.sl : v.sh,
                        og: valStr.includes("OGA") ? v.ol : v.oh,
                        sn: snChannel,
                        // DGA Present = Barrier (-1V), Missing = Flush (-10V)
                        dg: valStr.includes("DGA") ? v.dh : v.dl, 
                        drain: v.vdrain || -24, 
                        // Electrical Reset State
                        rgOpen: !valStr.includes("RGA"),
                        adcTxt: adcTxt,
                        adcActive: adcActive
                    };
                });

                if(parsedSequence.length > 0) {
                    document.getElementById("status-msg").innerText = "Successfully parsed physical architecture.";
                    currentState = 0;
                    updateViz();
                } else {
                    throw new Error("Could not find skipper sequence.");
                }

            } catch (error) {
                document.getElementById("state-name").innerText = "Parsing Error";
                document.getElementById("status-msg").innerText = error.message;
            }
        }

        function updateViz() {
            const state = parsedSequence[currentState];
            const t = d3.transition().duration(500);

            document.getElementById("state-name").innerText = state.id;
            document.getElementById("status-msg").innerHTML = `Executing Timer: <strong>${state.timer}</strong>`;
            
            const badge = document.getElementById("adc-badge");
            badge.innerText = state.adcTxt;
            badge.className = state.adcActive ? "adc-badge adc-active" : "adc-badge adc-inactive";

            // Show MR Reset Indicator when RG is open
            mrIndicator.transition(t).style("opacity", state.rgOpen ? 1 : 0);

            const pts = [
                {x: 0, y: state.sw}, {x: sectionWidth, y: state.sw},
                {x: sectionWidth, y: state.og}, {x: sectionWidth * 2, y: state.og},
                {x: sectionWidth * 2, y: state.sn}, {x: sectionWidth * 3, y: state.sn},
                {x: sectionWidth * 3, y: state.dg}, {x: sectionWidth * 4, y: state.dg},
                {x: sectionWidth * 4, y: state.drain}, {x: width, y: state.drain}
            ];

            const lineGen = d3.line().x(d => d.x).y(d => yScale(d.y));
            path.transition(t).attr("d", lineGen(pts));

	    // Dynamic Charge Tracking (Explicit State Routing)
            let targetX, targetY, opacity = 1;

            if (state.id.includes("8B") || state.id === "STATE_8") {
                // Charge is held upstream in H3. 
                // Keep it off-screen/invisible during the pedestal measurement.
                targetX = sectionWidth * 0.5; 
                targetY = yScale(-2.5); 
                opacity = 0; 
            } 
            else if (state.id.includes("8C") || state.id.includes("9")) {
                // Caught and resting in the deep Summing Well
                targetX = sectionWidth * 0.5; 
                targetY = yScale(state.sw + 0.5);
            } 
            else if (state.id.includes("10A") || state.id.includes("10RB") || state.id.includes("10B")) {
                // Dumped and squeezed onto the Sense Node for signal measurement
                targetX = sectionWidth * 2.5; 
                targetY = yScale(state.sn + 0.5);
            } 
            else if (state.id.includes("10RG") || state.dg === -10) {
                // Flushed through the Dump Gate into the Drain
                targetX = sectionWidth * 4.5; 
                targetY = yScale(state.drain); 
                opacity = 0;
            }

            chargePacket.transition(t)
                .attr("transform", `translate(${targetX}, ${targetY})`)
                .style("opacity", opacity);
        }

        function step(dir) {
            currentState += dir;
            updateViz();
        }

        window.onload = loadAndParse;
    </script>
</body>
</html>
